<!DOCTYPE html>
<html>
<head>
  <title>Classroom</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(270deg, #6a11cb, #2575fc);
  background-size: 400% 400%;
  animation: gradientMove 3s ease infinite;
  font-family: Arial, sans-serif;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Controls */
.controls {
  margin-top: 80px;
  display: flex;
  gap: 10px;
}

.controls input, .controls select {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

/* Grid */
.grid-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  width: 90%;
  max-width: 1000px;
  padding: 20px;
}

/* Items */
.grid-item {
  position: relative;
  background-color: rgba(255,255,255,0.9);
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  text-align: center;
  cursor: pointer;
  overflow: hidden;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.5s ease forwards;
}

.grid-item:hover {
  transform: scale(1.05);
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.grid-item img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.grid-item h3 {
  margin: 10px;
}

/* 🔒 Premium lock overlay */
.lock-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 18px;
  text-shadow: 0 0 5px black;
}

.blur {
  filter: blur(6px);
}

.back-button {
  top: 20px;
  left: 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  cursor: pointer;
}

/* ===== POPUP ===== */
#popupOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  z-index: 9999;
}
#popupOverlay.show {
  opacity: 1;
  pointer-events: auto;
}
#popupBox {
  background: white;
  border-radius: 14px;
  padding: 30px 35px;
  width: min(500px, 85%);
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  transform: scale(0.9);
  transition: transform 0.4s ease;
}
#popupOverlay.show #popupBox {
  transform: scale(1);
}
#popupBox button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #2575fc;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<button class="back-button" onclick="window.location.href='https://davcode149.github.io/dd-games/main.html'">← Back</button>

<h2 style="color:white;margin-top:30px;">Games</h2>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Search games...">
  <select id="sortSelect">
    <option value="az">Sort A–Z</option>
    <option value="za">Sort Z–A</option>
  </select>
</div>

<div class="grid-container" id="gameGrid"></div>

<script>
let allGames = [];

/* ===== LOAD USER (FIXED) ===== */
async function loadUser() {
  let myID = localStorage.getItem("device_id");
  if (!myID) {
    myID = crypto.randomUUID();
    localStorage.setItem("device_id", myID);
  }

  const res = await fetch(
    "https://lqfcntoldutgkzaboqfk.supabase.co/rest/v1/users?select=Premium&user_id=eq." + myID,
    {
      headers: {
        "apikey": "sb_publishable_Zs0J8nka95CzLZJ7BWqEAg_sqD5Wr0d",
        "Authorization": "Bearer sb_publishable_Zs0J8nka95CzLZJ7BWqEAg_sqD5Wr0d"
      }
    }
  );

  const data = await res.json();

  if (!data || !data[0]) return false;

  return data[0].Premium === true || data[0].Premium === "true";
}

/* ===== LOAD GAMES ===== */
async function loadGames() {
  const isPremiumUser = await loadUser();

  const res = await fetch("/dd-games/assets/games.json?v=" + Date.now(), {
    cache: "no-store"
  });

  const data = await res.json();
  allGames = data;
  renderGames(isPremiumUser);
}

/* ===== RENDER GAMES ===== */
function renderGames(isPremiumUser) {
  const grid = document.getElementById("gameGrid");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const sort = document.getElementById("sortSelect").value;

  let filtered = allGames.filter(g =>
    g.name.toLowerCase().includes(search)
  );

  filtered.sort((a, b) =>
    sort === "az"
      ? a.name.localeCompare(b.name)
      : b.name.localeCompare(a.name)
  );

  grid.innerHTML = "";

  filtered.forEach(game => {
    const item = document.createElement("div");
    item.className = "grid-item";

    const img = document.createElement("img");
    img.src = game.image;

    const title = document.createElement("h3");
    title.textContent = game.name;

    item.appendChild(img);
    item.appendChild(title);

    if (game.premium && !isPremiumUser) {
      img.classList.add("blur");

      const lock = document.createElement("div");
      lock.className = "lock-overlay";
      lock.textContent = "🔒 Premium Only";
      item.appendChild(lock);

      item.onclick = () => {
        window.location.href = "/dd-games/assets/premium-info.html";
      };
    } else {
      item.onclick = () => {
        window.location.href = game.link;
      };
    }

    grid.appendChild(item);
  });
}

document.getElementById("searchInput").addEventListener("input", loadGames);
document.getElementById("sortSelect").addEventListener("change", loadGames);

loadGames();
</script>

</body>
</html>
